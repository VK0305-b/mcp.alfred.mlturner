name: Release

on:
  push:
    branches:
      - master

# One release-bump at a time on master
concurrency:
  group: release-bump-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Yarn
        run: npm install -g yarn@1.22.21

      - name: Install dependencies
        run: yarn install

      # Do not create the version tag here; tag and GitHub release run after
      # the version-bump PR is merged to master (see version_bump_merged_release.yml).
      - name: Bump version and create tag
        id: bumpr
        uses: haya14busa/action-bumpr@v1
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          default_bump_level: 'patch'
          # Branch protection blocks direct push to master; the tag and release
          # are created in the follow-up workflow after the version PR lands.
          dry_run: 'true'
          tag_as_user: 'github-actions[bot]'
          tag_as_email: 'github-actions[bot]@users.noreply.github.com'

      # Update package.json files if version was bumped
      - name: Update package versions
        if: steps.bumpr.outputs.skip != 'true'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.bumpr.outputs.next_version }}"
          NEW_VERSION_NO_V="${NEW_VERSION#v}"

          echo "Updating versions to: $NEW_VERSION_NO_V"

          # Update root package.json only when the target version differs.
          CURRENT_ROOT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_ROOT_VERSION" != "$NEW_VERSION_NO_V" ]; then
            npm version "$NEW_VERSION_NO_V" --no-git-tag-version
          else
            echo "Root package.json already at $NEW_VERSION_NO_V; skipping."
          fi

          # Update all package.json files in packages/
          for package_dir in packages/*/; do
            if [ -f "$package_dir/package.json" ]; then
              echo "Checking $package_dir/package.json"
              cd "$package_dir"
              CURRENT_PKG_VERSION=$(node -p "require('./package.json').version")
              if [ "$CURRENT_PKG_VERSION" != "$NEW_VERSION_NO_V" ]; then
                npm version "$NEW_VERSION_NO_V" --no-git-tag-version
              else
                echo "$package_dir already at $NEW_VERSION_NO_V; skipping."
              fi
              cd ../..
            fi
          done

      - name: Open version-bump pull request
        if: steps.bumpr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          BUMP_MSG: ${{ steps.bumpr.outputs.message }}
        run: |
          set -euo pipefail
          BUMP_VERSION="${{ steps.bumpr.outputs.next_version }}"
          BRANCH="chore/bump-version-${BUMP_VERSION}"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git checkout -b "$BRANCH"
          git add package.json packages/*/package.json
          if git diff --cached --quiet; then
            echo "No staged version changes; nothing to commit/PR."
            exit 0
          fi
          git commit -m "chore: bump version to ${BUMP_VERSION}"
          git push -u origin "$BRANCH"

          if [ "$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number -q 'length' 2>/dev/null || echo 0)" -gt 0 ]; then
            echo "Open pull request for $BRANCH already exists."
            exit 0
          fi

          {
            echo "Automated version bump. **Merge this PR** after required checks (e.g. *Run Validations*) pass. The tag and GitHub release are created when this PR is merged."
            echo
            echo "$BUMP_MSG"
          } > /tmp/pr_body.md

          gh pr create --repo "$GITHUB_REPOSITORY" --base master --head "$BRANCH" \
            --title "chore: bump version to ${BUMP_VERSION}" \
            --body-file /tmp/pr_body.md

          echo "Opened version bump pull request. Merge to create the tag, GitHub release, and trigger npm publish."
