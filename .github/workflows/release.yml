name: Release

on:
  push:
    branches:
      - master

# One release-bump at a time on master
concurrency:
  group: release-bump-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Uses github.token (no personal PAT) for this fork. To use a PAT, set
    # secret RELEASE_TOKEN and change token / github_token / GH_TOKEN to secrets.RELEASE_TOKEN.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Yarn
        run: npm install -g yarn@1.22.21

      - name: Install dependencies
        run: yarn install

      # Do not create the version tag here; tag and GitHub release run after
      # the version-bump PR is merged to master (see version_bump_merged_release.yml).
      - name: Bump version and create tag
        id: bumpr
        uses: haya14busa/action-bumpr@v1
        with:
          github_token: ${{ github.token }}
          default_bump_level: 'patch'
          # Branch protection blocks direct push to master; the tag and release
          # are created in the follow-up workflow after the version PR lands.
          dry_run: 'true'
          tag_as_user: 'github-actions[bot]'
          tag_as_email: 'github-actions[bot]@users.noreply.github.com'

      # Update package.json files if version was bumped
      - name: Update package versions
        if: steps.bumpr.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.bumpr.outputs.next_version }}"
          NEW_VERSION_NO_V="${NEW_VERSION#v}"

          echo "Updating versions to: $NEW_VERSION_NO_V"

          # Update root package.json
          npm version $NEW_VERSION_NO_V --no-git-tag-version

          # Update all package.json files in packages/
          for package_dir in packages/*/; do
            if [ -f "$package_dir/package.json" ]; then
              echo "Updating $package_dir/package.json"
              cd "$package_dir"
              npm version $NEW_VERSION_NO_V --no-git-tag-version
              cd ../..
            fi
          done

      - name: Push version-bump branch and open pull request
        if: steps.bumpr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP_MSG: ${{ steps.bumpr.outputs.message }}
        run: |
          set -euo pipefail
          BUMP_VERSION="${{ steps.bumpr.outputs.next_version }}"
          BRANCH="chore/bump-version-${BUMP_VERSION}"
          REPO_API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          HEAD_PARAM="${{ github.repository_owner }}:${BRANCH}"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git checkout -b "$BRANCH"
          git add package.json packages/*/package.json
          if git diff --cached --quiet; then
            echo "No staged version changes; aborting."
            exit 1
          fi
          git commit -m "chore: bump version to ${BUMP_VERSION}"
          git push -u origin "HEAD:refs/heads/${BRANCH}"

          # Open PRs without the gh CLI (not always on the runner; use REST API).
          EXISTING=$(curl -sS -G -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data-urlencode "head=${HEAD_PARAM}" --data-urlencode "state=open" \
            "${REPO_API}/pulls" | jq 'length')
          if [ "${EXISTING}" -gt 0 ]; then
            echo "An open pull request for ${BRANCH} already exists. Nothing to do."
            exit 0
          fi

          {
            echo "Automated version bump. **Merge this PR** after required checks (e.g. *Run Validations*) pass. The tag and GitHub release are created when this PR is merged."
            echo
            echo "${BUMP_MSG}"
          } > /tmp/pr_body.md

          TITLE="chore: bump version to ${BUMP_VERSION}"
          jq -n --arg head "$BRANCH" --arg base "master" --arg title "$TITLE" --rawfile body /tmp/pr_body.md \
            '{head: $head, base: $base, title: $title, body: $body}' \
            | curl -sS -f -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d @- \
              "${REPO_API}/pulls"

          echo "Opened version bump pull request. Merge to create the tag, GitHub release, and trigger npm publish."
