name: Publish Package to NPM
on:
  workflow_dispatch:
  # Publish for release tags and for published GitHub Releases (PATs that create
  # tags or releases are required for chained workflows; release:published
  # covers softprops/action-gh-release without relying on a tag *push* event).
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    # Add secret NPM_TOKEN under Settings > Secrets. publishing @mondaydotcomorg/* may require org access.
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: '20.18.1'
          registry-url: https://registry.npmjs.org/

      - name: Install Yarn
        run: npm install -g yarn@1.22.21

      - run: yarn install

      # Build packages using Turborepo
      - name: Build packages
        run: yarn build

      - name: Get changed packages
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD | grep "^packages/" | cut -d/ -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
          if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ]; then
            CHANGED=$(ls -1 packages 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length>0))')
            echo "No file diff under packages/ for this tag; publishing all workspace packages" >&2
          fi
          echo "packages=$CHANGED" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Publish changed packages
        if: steps.changed.outputs.packages != '[]' && steps.changed.outputs.packages != ''
        run: |
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" > .npmrc
          PACKAGES=$(echo '${{ steps.changed.outputs.packages }}' | jq -r '.[]')
          for PKG in $PACKAGES; do
            cd "packages/$PKG" || exit 1
            NAME=$(node -p "require('./package.json').name")
            VER=$(node -p "require('./package.json').version")
            set +e
            PUBLISHED=$(npm view "$NAME@$VER" version 2>/dev/null)
            PUB_RC=$?
            set -e
            if [ $PUB_RC -eq 0 ] && [ "$PUBLISHED" = "$VER" ]; then
              echo "Skip $NAME@$VER (already on npm registry)"
            else
              echo "Publishing $NAME@$VER to npm"
              yarn publish --access public
            fi
            cd - >/dev/null
          done
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
